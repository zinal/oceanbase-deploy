global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets


defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 10s
    timeout client  24h
    timeout server  24h
    timeout tunnel  24h

# --- MySQL/OceanBase через OBProxy (порт 2883) ---

frontend obproxy_mysql
    bind 127.0.0.1:2883
#    bind [::]:2883
    default_backend obproxy_servers

backend obproxy_servers
    # Привязка клиента к backend по IP источника (sticky на уровне соединений)
    balance roundrobin

    # Пассивная TCP-проверка доступности порта obproxy
    option tcp-check
    default-server inter 5s fall 3 rise 2

    # Замените на реальные IP или FQDN obproxy из inventory.env
    server obproxy1 ob-yc-prod-obproxy-1:2883 check
    server obproxy2 ob-yc-prod-obproxy-2:2883 check
    # server obproxy3 ob-yc-prod-obproxy-3.ru-central1.internal:2883 check

